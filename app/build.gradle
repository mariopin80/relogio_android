plugins {
    id "com.android.application"
}

android {
    namespace "br.com.pu2ptu.relogiocentrocontrole"
    compileSdk 35

    defaultConfig {
        applicationId "br.com.pu2ptu.relogiocentrocontrole"
        minSdk 26
        targetSdk 35
        versionCode 4
        versionName "1.3.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
