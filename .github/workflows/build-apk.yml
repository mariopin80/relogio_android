name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk RelogioCentroControle-Android-v1.1.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RelogioCentroControle-Android-v1.1
          path: RelogioCentroControle-Android-v1.1.apk
          if-no-files-found: error
          retention-days: 30
